<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="icon" href="aditya.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
    <!-- Boxicons CSS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel="stylesheet"> 
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="aditya.jpeg" alt="" class="profile-image">
        </div>
        
        <div class="text-data">
            <span class="name">Aditya Gurav</span>
            <span class="job">Student</span>
        </div>
        <div class="media-button">
            <a href="https://www.instagram.com/adetyagurav/" style="background: #C13584;" class="link" target="_blank" rel="noopener">
                <i class='bx bxl-instagram'></i>
            </a>
            <a href="https://x.com/adityaagurav" style="background: #1A8CD8 ;" class="link" target="_blank" rel="noopener">
                <i class='bx bxl-twitter' ></i>
            </a>
            <a href="https://github.com/adityaagurav" style="background: #24292F ;" class="link" target="_blank" rel="noopener">
                <i class='bx bxl-github' ></i>
            </a>
            <a href="https://www.linkedin.com/in/adityaagurav" style="background: #0077B5;" class="link" target="_blank" rel="noopener">
                <i class='bx bxl-linkedin' ></i>
            </a>
        </div>

    </div>
</body>
</html>
